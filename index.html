<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AHJ \u2014 Developer Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   CSS CUSTOM PROPERTIES
   ============================================================ */
:root {
  --bg: #050508;
  --bg2: #080b12;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --blue: #4f8ef7;
  --purple: #9b5de5;
  --cyan: #00d4ff;
  --glow-blue: rgba(79,142,247,0.35);
  --glow-purple: rgba(155,93,229,0.35);
  --text: #e8ecf4;
  --muted: #6b7280;
  --accent-grad: linear-gradient(135deg, var(--blue), var(--purple));
  --font-display: 'Orbitron', monospace;
  --font-body: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;
  cursor: none;
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

/* ============================================================
   CUSTOM CURSOR
   ============================================================ */
#cursor-outer {
  position: fixed;
  width: 36px; height: 36px;
  border: 1.5px solid var(--blue);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.12s var(--ease), opacity 0.3s, border-color 0.3s;
  transform: translate(-50%, -50%);
  mix-blend-mode: normal;
}
#cursor-inner {
  position: fixed;
  width: 6px; height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.06s;
  box-shadow: 0 0 8px var(--cyan), 0 0 20px var(--cyan);
}
body.cursor-hover #cursor-outer {
  transform: translate(-50%, -50%) scale(1.8);
  border-color: var(--purple);
  background: rgba(155,93,229,0.08);
}

/* ============================================================
   LOADER / INTRO
   ============================================================ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  transition: opacity 0.6s var(--ease), visibility 0.6s;
}
#loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loader-logo {
  font-family: var(--font-display);
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 900;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.2em;
  animation: loaderPulse 1.2s ease-in-out infinite alternate;
}
@keyframes loaderPulse {
  from { opacity: 0.4; filter: blur(1px); }
  to   { opacity: 1;   filter: blur(0); }
}
.loader-bar-wrap {
  width: 240px; height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: var(--accent-grad);
  border-radius: 2px;
  width: 0%;
  transition: width 0.05s linear;
  box-shadow: 0 0 12px var(--blue);
}
.loader-pct {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.15em;
}

/* ============================================================
   NAVBAR
   ============================================================ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 800;
  padding: 0 clamp(1.5rem, 5vw, 4rem);
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s;
}
nav.scrolled {
  background: rgba(5,5,8,0.85);
  backdrop-filter: blur(20px);
  box-shadow: 0 1px 0 var(--border);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 900;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.12em;
}
.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}
.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  position: relative;
  transition: color 0.3s;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: var(--accent-grad);
  transform: scaleX(0);
  transition: transform 0.3s var(--ease);
}
.nav-links a:hover, .nav-links a.active { color: var(--text); }
.nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: none;
  padding: 4px;
}
.nav-toggle span {
  width: 24px; height: 1.5px;
  background: var(--text);
  border-radius: 2px;
  transition: transform 0.3s, opacity 0.3s;
  display: block;
}
.nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-mobile {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,5,8,0.97);
  backdrop-filter: blur(20px);
  z-index: 790;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3rem;
}
.nav-mobile.open { display: flex; }
.nav-mobile a {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.15em;
  transition: color 0.3s;
}
.nav-mobile a:hover { color: var(--text); }

/* ============================================================
   CANVAS (background)
   ============================================================ */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ============================================================
   SECTIONS \u2014 base
   ============================================================ */
section {
  position: relative;
  z-index: 1;
  padding: clamp(5rem, 10vw, 9rem) clamp(1.5rem, 5vw, 6rem);
  max-width: 1280px;
  margin: 0 auto;
}
.section-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  color: var(--blue);
  text-transform: uppercase;
  margin-bottom: 1rem;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 1.2rem;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s var(--ease) 0.1s, transform 0.7s var(--ease) 0.1s;
}
.section-title span {
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.in-view .section-label,
.in-view .section-title { opacity: 1; transform: translateY(0); }

/* ============================================================
   HERO SECTION
   ============================================================ */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-top: 8rem;
  max-width: 1280px;
  margin: 0 auto;
  padding-left: clamp(1.5rem, 5vw, 6rem);
  padding-right: clamp(1.5rem, 5vw, 6rem);
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 0.8s var(--ease) 0.8s forwards;
}
.hero-name {
  font-family: var(--font-display);
  font-size: clamp(3.5rem, 10vw, 8rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-bottom: 1.2rem;
  opacity: 0;
  animation: fadeUp 0.9s var(--ease) 1s forwards;
}
.hero-name .grad {
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block;
}
.hero-sub {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--muted);
  margin-bottom: 0.6rem;
  max-width: 540px;
  opacity: 0;
  animation: fadeUp 0.9s var(--ease) 1.2s forwards;
}
.hero-typewriter {
  font-family: var(--font-mono);
  font-size: clamp(0.9rem, 1.8vw, 1.1rem);
  color: var(--blue);
  min-height: 1.8em;
  margin-bottom: 2.8rem;
  opacity: 0;
  animation: fadeUp 0.9s var(--ease) 1.35s forwards;
}
.hero-typewriter .cursor-blink {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--cyan);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.hero-btns {
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.9s var(--ease) 1.55s forwards;
}
.btn-primary, .btn-ghost {
  padding: 0.85rem 2.2rem;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: none;
  transition: transform 0.3s var(--ease-back), box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: var(--accent-grad);
  color: #fff;
  border: none;
  box-shadow: 0 0 24px var(--glow-blue);
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 0 40px var(--glow-blue), 0 8px 24px rgba(0,0,0,0.4);
}
.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  transform: translateY(-3px) scale(1.03);
  border-color: var(--blue);
  box-shadow: 0 0 20px var(--glow-blue);
  color: var(--cyan);
}
.btn-primary::after, .btn-ghost::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.12);
  transform: translateX(-100%) skewX(-12deg);
  transition: transform 0.5s var(--ease);
}
.btn-primary:hover::after, .btn-ghost:hover::after { transform: translateX(120%) skewX(-12deg); }

.hero-scroll-hint {
  position: absolute;
  bottom: 3rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeIn 1s var(--ease) 2.2s forwards;
}
.hero-scroll-hint span {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, var(--blue), transparent);
  animation: scrollPulse 1.8s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity: 0.3; transform: scaleY(0.6); }
  50% { opacity: 1; transform: scaleY(1); }
}

.hero-deco {
  position: absolute;
  right: clamp(1rem, 5vw, 6rem);
  top: 50%;
  transform: translateY(-50%);
  width: clamp(220px, 30vw, 360px);
  height: clamp(220px, 30vw, 360px);
  pointer-events: none;
  opacity: 0;
  animation: fadeIn 1.2s var(--ease) 1.4s forwards;
}
.hero-deco-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(79,142,247,0.25);
  animation: rotateSlow 18s linear infinite;
}
.hero-deco-ring:nth-child(2) {
  inset: 18%;
  border-color: rgba(155,93,229,0.3);
  animation-duration: 12s;
  animation-direction: reverse;
}
.hero-deco-ring:nth-child(3) {
  inset: 35%;
  border-color: rgba(0,212,255,0.35);
  animation-duration: 8s;
}
.hero-deco-center {
  position: absolute;
  inset: 42%;
  background: var(--accent-grad);
  border-radius: 50%;
  box-shadow: 0 0 40px var(--glow-blue), 0 0 80px var(--glow-purple);
  animation: glowPulse 3s ease-in-out infinite alternate;
}
@keyframes rotateSlow { to { transform: rotate(360deg); } }
@keyframes glowPulse {
  from { box-shadow: 0 0 20px var(--glow-blue), 0 0 40px var(--glow-purple); }
  to   { box-shadow: 0 0 60px var(--glow-blue), 0 0 100px var(--glow-purple); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Hero floating tags */
.hero-tags {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 0.9s var(--ease) 1.1s forwards;
}
.hero-tag {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--purple);
  border: 1px solid rgba(155,93,229,0.3);
  padding: 0.3rem 0.8rem;
  border-radius: 2px;
  letter-spacing: 0.08em;
  background: rgba(155,93,229,0.06);
}

/* ============================================================
   ABOUT SECTION
   ============================================================ */
#about { padding-top: clamp(5rem, 10vw, 9rem); }
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: clamp(2rem, 5vw, 5rem);
  align-items: center;
  margin-top: 3rem;
}
.about-img-wrap {
  position: relative;
  opacity: 0;
  transform: translateX(-32px);
  transition: opacity 0.8s var(--ease) 0.2s, transform 0.8s var(--ease) 0.2s;
}
.in-view .about-img-wrap { opacity: 1; transform: translateX(0); }
.about-img-frame {
  width: 100%;
  max-width: 300px;
  aspect-ratio: 1;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a1d2e, #0f111a);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  margin: 0 auto;
  box-shadow: 0 0 40px var(--glow-blue);
}
.about-img-frame::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(from 0deg, transparent 60%, var(--blue) 80%, transparent 100%);
  animation: rotateSlow 4s linear infinite;
  opacity: 0.4;
}
.about-img-inner {
  position: relative;
  z-index: 1;
  width: calc(100% - 4px);
  height: calc(100% - 4px);
  border-radius: 50%;
  background: linear-gradient(135deg, #111320, #0d0f1a);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.about-avatar-text {
  font-family: var(--font-display);
  font-size: 4.5rem;
  font-weight: 900;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.about-badge {
  position: absolute;
  bottom: 8%;
  right: 5%;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--cyan);
  letter-spacing: 0.08em;
  backdrop-filter: blur(10px);
  white-space: nowrap;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.about-content {
  opacity: 0;
  transform: translateX(32px);
  transition: opacity 0.8s var(--ease) 0.3s, transform 0.8s var(--ease) 0.3s;
}
.in-view .about-content { opacity: 1; transform: translateX(0); }
.about-text {
  color: var(--muted);
  line-height: 1.8;
  font-size: 1rem;
  margin-bottom: 2rem;
}
.about-text strong { color: var(--text); }
.about-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.2rem 1rem;
  text-align: center;
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s var(--ease-back);
}
.stat-card:hover {
  border-color: var(--blue);
  box-shadow: 0 0 20px var(--glow-blue);
  transform: translateY(-4px);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 900;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block;
  line-height: 1;
  margin-bottom: 0.4rem;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ============================================================
   SKILLS SECTION
   ============================================================ */
#skills { padding-top: clamp(4rem, 8vw, 7rem); }
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  margin-top: 3rem;
}
.skill-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.8rem;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease),
              border-color 0.3s, box-shadow 0.3s;
}
.skill-card:hover {
  border-color: var(--blue);
  box-shadow: 0 0 30px var(--glow-blue), inset 0 0 30px rgba(79,142,247,0.04);
  transform: translateY(-6px) !important;
}
.skill-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-grad);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s var(--ease);
}
.skill-card:hover::before { transform: scaleX(1); }
.in-view .skill-card { opacity: 1; transform: translateY(0); }
.in-view .skill-card:nth-child(2) { transition-delay: 0.1s; }
.in-view .skill-card:nth-child(3) { transition-delay: 0.2s; }
.in-view .skill-card:nth-child(4) { transition-delay: 0.3s; }
.in-view .skill-card:nth-child(5) { transition-delay: 0.4s; }
.in-view .skill-card:nth-child(6) { transition-delay: 0.5s; }

.skill-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: rgba(79,142,247,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.2rem;
  font-size: 1.3rem;
  transition: background 0.3s, transform 0.3s var(--ease-back);
}
.skill-card:hover .skill-icon {
  background: rgba(79,142,247,0.22);
  transform: scale(1.1) rotate(-4deg);
}
.skill-name {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
.skill-category {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--blue);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.skill-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: visible;
  position: relative;
}
.skill-bar {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-grad);
  width: 0%;
  transition: width 1.4s var(--ease) 0.3s;
  position: relative;
}
.skill-bar::after {
  content: '';
  position: absolute;
  right: -2px; top: -4px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
  transition: opacity 0.3s;
}
.skill-pct {
  position: absolute;
  right: 0; top: -22px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--cyan);
  letter-spacing: 0.05em;
}

/* ============================================================
   PROJECTS SECTION
